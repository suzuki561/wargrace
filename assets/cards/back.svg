<svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,'Times New Roman',serif">
  <defs>
    <radialGradient id="bk-bg" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#2b2150"/><stop offset="0.7" stop-color="#1a1333"/><stop offset="1" stop-color="#0e0a1e"/>
    </radialGradient>
    <radialGradient id="bk-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9b8ae0" stop-opacity="0.28"/><stop offset="1" stop-color="#9b8ae0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="bk-lattice" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(45 0 0)">
      <rect width="26" height="26" fill="none"/>
      <path d="M0 0 H26 M0 13 H26" stroke="#9b8ae0" stroke-opacity="0.10" stroke-width="1"/>
      <path d="M0 0 V26 M13 0 V26" stroke="#9b8ae0" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="4" y="4" width="292" height="412" rx="16" fill="url(#bk-bg)" stroke="#c9a227" stroke-width="3"/>
  <rect x="12" y="12" width="276" height="396" rx="11" fill="url(#bk-lattice)" stroke="#c9a227" stroke-opacity="0.55" stroke-width="1.5"/>
  <rect x="19" y="19" width="262" height="382" rx="8" fill="none" stroke="#9b8ae0" stroke-opacity="0.3"/>

  <!-- corner ornaments (4x rotational symmetry) -->
  <g stroke="#c9a227" stroke-width="2" fill="none" stroke-opacity="0.85">
    <path d="M26 54 C26 38 38 26 54 26"/>
    <path d="M274 54 C274 38 262 26 246 26"/>
    <path d="M26 366 C26 382 38 394 54 394"/>
    <path d="M274 366 C274 382 262 394 246 394"/>
  </g>
  <g fill="#c9a227" opacity="0.9">
    <path d="M40 40 L46 34 L52 40 L46 46 Z"/>
    <path d="M260 40 L254 34 L248 40 L254 46 Z"/>
    <path d="M40 380 L46 374 L52 380 L46 386 Z"/>
    <path d="M260 380 L254 374 L248 380 L254 386 Z"/>
  </g>

  <!-- central medallion -->
  <circle cx="150" cy="210" r="98" fill="url(#bk-glow)"/>
  <circle cx="150" cy="210" r="78" fill="none" stroke="#c9a227" stroke-width="2.5"/>
  <circle cx="150" cy="210" r="70" fill="none" stroke="#9b8ae0" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="3 7"/>
  <circle cx="150" cy="210" r="86" fill="none" stroke="#c9a227" stroke-opacity="0.4"/>

  <!-- sigil: shield, crossed sword & staff, crown -->
  <path d="M150 168 C172 168 184 178 184 196 C184 228 166 250 150 262 C134 250 116 228 116 196 C116 178 128 168 150 168 Z"
        fill="#241b42" stroke="#9b8ae0" stroke-width="2"/>
  <line x1="122" y1="182" x2="178" y2="240" stroke="#e8eef5" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="129" y1="176" x2="139" y2="188" stroke="#c9a227" stroke-width="4" stroke-linecap="round"/>
  <line x1="178" y1="182" x2="122" y2="240" stroke="#b39aE8" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="178" cy="182" r="6" fill="#cf7bff" stroke="#e8dcff" stroke-width="1.5"/>
  <path d="M132 148 L132 130 L141 140 L150 126 L159 140 L168 130 L168 148 Z"
        fill="#e8c34a" stroke="#a07818" stroke-width="1.5"/>
  <circle cx="139" cy="143" r="2.4" fill="#c03434"/>
  <circle cx="150" cy="143" r="2.4" fill="#2a5aa8"/>
  <circle cx="161" cy="143" r="2.4" fill="#c03434"/>

  <!-- dice pips: guard count motif -->
  <g fill="#c9a227" opacity="0.75">
    <circle cx="150" cy="284" r="3"/>
    <circle cx="136" cy="284" r="2"/>
    <circle cx="164" cy="284" r="2"/>
  </g>

  <!-- title -->
  <text x="150" y="90" text-anchor="middle" font-size="26" letter-spacing="7" fill="#e8c34a" font-weight="bold">WARGRACE</text>
  <line x1="70" y1="104" x2="230" y2="104" stroke="#c9a227" stroke-opacity="0.6"/>
  <text x="150" y="122" text-anchor="middle" font-size="10" letter-spacing="5" fill="#9b8ae0">SPELL &#183; GUARD &#183; STRIKE</text>

  <text x="150" y="330" text-anchor="middle" font-size="13" letter-spacing="6" fill="#9b8ae0" opacity="0.85"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif">ウォーグレイス</text>
  <line x1="94" y1="346" x2="206" y2="346" stroke="#c9a227" stroke-opacity="0.5"/>
  <path d="M144 358 L150 352 L156 358 L150 364 Z" fill="#c9a227" opacity="0.8"/>
</svg>
