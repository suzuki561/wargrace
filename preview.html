<style>
:root{
  --ground:#14101f; --panel:#1d1730; --ink:#ece7f5; --muted:#9c92bd;
  --gold:#c9a227; --violet:#9b8ae0; --line:rgba(155,138,224,.25);
}
@media (prefers-color-scheme: light){
  :root{ --ground:#efeae0; --panel:#e4dccb; --ink:#2c2440; --muted:#6b6284; --line:rgba(90,70,140,.25); }
}
:root[data-theme="dark"]{ --ground:#14101f; --panel:#1d1730; --ink:#ece7f5; --muted:#9c92bd; --line:rgba(155,138,224,.25); }
:root[data-theme="light"]{ --ground:#efeae0; --panel:#e4dccb; --ink:#2c2440; --muted:#6b6284; --line:rgba(90,70,140,.25); }
body{ background:var(--ground); color:var(--ink);
  font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
  margin:0; padding:48px 32px 80px; }
.wrap{ max-width:1080px; margin:0 auto; }
header{ text-align:center; margin-bottom:56px; }
h1{ font-size:44px; letter-spacing:.28em; margin:0 0 6px; color:var(--gold); font-weight:600; text-wrap:balance; }
header p{ margin:0; color:var(--muted); letter-spacing:.14em; font-size:14px; }
header .rule{ width:120px; height:1px; background:var(--gold); opacity:.6; margin:20px auto 0; }
section{ margin-bottom:64px; }
h2{ font-size:20px; letter-spacing:.2em; font-weight:600; margin:0; color:var(--ink); }
.sec-head{ display:flex; align-items:baseline; gap:14px; border-bottom:1px solid var(--line); padding-bottom:10px; margin-bottom:28px; }
.sec-head .count{ color:var(--muted); font-size:13px; letter-spacing:.08em; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:28px; }
.grid.narrow{ grid-template-columns:repeat(auto-fill,minmax(220px,240px)); justify-content:center; }
figure{ margin:0; }
figure svg{ width:100%; height:auto; display:block; border-radius:12px;
  box-shadow:0 10px 28px rgba(0,0,0,.45); }
figcaption{ text-align:center; margin-top:10px; color:var(--muted); font-size:13px; letter-spacing:.1em; }
</style>
