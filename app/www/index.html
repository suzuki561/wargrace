<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="wargrace">
<meta name="theme-color" content="#14101f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>wargrace</title>
</head>
<body>
<title>wargrace</title>
<style>
:root{ --tilt:52deg; --fit:1; --zoom:1; --userZoom:1; --camZoom:1; --panX:0px; --panY:0px;
  --gold:#c9a227; --violet:#9b8ae0; --ink:#ece7f5; }
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0; overflow:hidden; background:radial-gradient(120% 90% at 50% 30%, #1c1533 0%, #0b0817 70%);
  font-family:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif; color:var(--ink);
  -webkit-user-select:none; user-select:none;
  touch-action:manipulation; -webkit-touch-callout:none; overscroll-behavior:none;
}
.glow{ position:fixed; width:44vmin; height:44vmin; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, rgba(232,148,74,.13), transparent 68%); filter:blur(8px);
  animation:flicker 5s ease-in-out infinite alternate; }
.g1{ left:-8vmin; top:-8vmin; } .g2{ right:-8vmin; bottom:-6vmin; animation-delay:2.2s; }
@keyframes flicker{ from{opacity:.7} to{opacity:1} }

.hud{ position:fixed; top:0; left:0; right:0; z-index:30; display:flex; justify-content:space-between;
  align-items:center; pointer-events:none;
  padding:calc(14px + env(safe-area-inset-top, 0px)) calc(22px + env(safe-area-inset-right, 0px))
          14px calc(22px + env(safe-area-inset-left, 0px)); }
.brand{ font-size:19px; letter-spacing:.3em; color:var(--gold); font-weight:600; }
.brand span{ display:block; font-size:10px; letter-spacing:.2em; color:var(--violet); margin-top:2px; }
.view{ pointer-events:auto; font-size:12px; letter-spacing:.15em; color:var(--violet);
  display:flex; align-items:center; gap:10px; background:rgba(20,14,38,.7);
  border:1px solid rgba(155,138,224,.35); border-radius:999px; padding:7px 16px; }
.view input{ accent-color:var(--gold); width:120px; }
.audio{ pointer-events:auto; display:flex; gap:8px; align-items:center; }
.audioBtn{ font-family:inherit; font-size:12px; letter-spacing:.1em; color:var(--violet);
  background:rgba(20,14,38,.7); border:1px solid rgba(155,138,224,.35); border-radius:999px;
  padding:7px 14px; cursor:pointer; }
.audioBtn:hover{ filter:brightness(1.35); }
.audioBtn.off{ opacity:.45; text-decoration:line-through; }

.scene{ position:fixed; inset:0; perspective:1500px; perspective-origin:50% 32%;
  transform:translate(var(--panX), var(--panY)) scale(calc(var(--userZoom) * var(--camZoom)));
  transform-origin:50% 50%; touch-action:none; }
.world{ position:absolute; left:50%; top:53%; width:1040px; height:920px; margin:-470px 0 0 -520px;
  transform:scale(calc(var(--fit) * var(--zoom))) rotateX(var(--tilt)); transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.3,.7,.3,1); }
.table{
  position:absolute; inset:0; transform-style:preserve-3d;
  display:flex; flex-direction:column; justify-content:space-between; padding:30px 48px;
  border-radius:26px; background:radial-gradient(75% 75% at 50% 46%, #2c2450 0%, #1d1740 55%, #161129 100%);
  box-shadow:0 0 0 10px #3a2c14, 0 0 0 13px var(--gold), 0 60px 110px rgba(0,0,0,.65),
    inset 0 0 90px rgba(0,0,0,.45);
}
.row{ display:flex; align-items:flex-start; gap:22px; transform-style:preserve-3d; }
.grow{ flex:1; }

.spot{ position:relative; width:100px; height:140px; transform-style:preserve-3d; flex:none;
  border-radius:8px; }
.spot.sm{ width:78px; height:109px; }
.cs{ width:100%; height:100%; display:block; border-radius:8px; box-shadow:0 3px 8px rgba(0,0,0,.55); }
.cap{ text-align:center; font-size:12px; letter-spacing:.18em; color:rgba(201,162,39,.85); margin-top:7px; white-space:nowrap; }
.cap b{ font-size:15px; color:#f0e2ae; }

.stand{ transform-origin:50% 100%; transform:rotateX(calc(var(--tilt) * -1)) translateZ(1px); }
.stand::after{ content:""; position:absolute; left:6%; bottom:-7px; width:88%; height:14px;
  background:radial-gradient(50% 50% at 50% 50%, rgba(0,0,0,.55), transparent 75%);
  transform:rotateX(calc(var(--tilt))); pointer-events:none; }

.wait{ display:flex; flex-direction:column; align-items:center; gap:8px; transform-style:preserve-3d; min-width:266px; }
.wrow{ display:flex; gap:16px; transform-style:preserve-3d; min-height:109px; }
.zone-cap{ font-size:11px; letter-spacing:.3em; color:rgba(155,138,224,.75); }

.bf{ align-items:center; justify-content:center; position:relative; }
.bflabel{ position:absolute; left:6px; top:50%; transform:translateY(-50%);
  writing-mode:vertical-rl; font-size:12px; letter-spacing:.35em; color:rgba(155,138,224,.7); }
.slots{ display:flex; gap:30px; transform-style:preserve-3d; }
.slot{ width:100px; height:140px; border:2px dashed rgba(201,162,39,.38); border-radius:10px;
  display:grid; place-items:center; color:rgba(201,162,39,.5); font-size:13px; letter-spacing:.3em;
  transform-style:preserve-3d; }
.mine .slot{ border-color:rgba(155,138,224,.45); color:rgba(155,138,224,.6); }
.slot .spot{ margin-bottom:8px; }

.ebadge{ position:absolute; top:2%; right:3%; width:26%; aspect-ratio:1; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #9fe0ff, #1e5f9a); border:2px solid var(--gold);
  display:grid; place-items:center; font-weight:bold; color:#fff; font-size:14px;
  font-family:Georgia,serif; z-index:2; }
.ebadge.up{ background:radial-gradient(circle at 35% 30%, #a8f0b8, #1e7a3a); }
.ebadge.down{ background:radial-gradient(circle at 35% 30%, #f0a8a8, #8a1f1f); }
.freshTag{ position:absolute; left:5%; bottom:6%; width:90%; text-align:center; font-size:10px;
  letter-spacing:.2em; color:#d8c8a8; background:rgba(20,12,30,.8); border:1px solid rgba(201,162,39,.5);
  border-radius:5px; padding:2px 0; z-index:2; }
.fresh .cs{ filter:brightness(.72) saturate(.8); }

.targetable{ cursor:pointer; animation:pulse 1.1s ease-in-out infinite; }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 3px rgba(232,195,74,.3);} 50%{ box-shadow:0 0 0 8px rgba(232,195,74,.75);} }
.peril{ animation:peril 1s ease-in-out infinite; border-radius:8px; }
@keyframes peril{ 0%,100%{ box-shadow:0 0 0 3px rgba(216,74,74,.35);} 50%{ box-shadow:0 0 0 9px rgba(216,74,74,.8);} }

.mid{ align-items:center; justify-content:center; gap:46px; }
.deckwrap{ display:flex; flex-direction:column; align-items:center; transform-style:preserve-3d; }
.deck{ position:relative; width:100px; height:140px; transform-style:preserve-3d; transition:opacity .4s; }
.deck .cs{ position:absolute; inset:0; }
.deck .cs:nth-child(1){ transform:translateZ(0px); } .deck .cs:nth-child(2){ transform:translateZ(1.6px); }
.deck .cs:nth-child(3){ transform:translateZ(3.2px); } .deck .cs:nth-child(4){ transform:translateZ(4.8px); }
.deck .cs:nth-child(5){ transform:translateZ(6.4px); }
.discardSlot{ position:relative; width:100px; height:140px; border:2px dashed rgba(155,138,224,.35);
  border-radius:10px; }
.discardSlot .cs{ position:absolute; inset:-2px; }

/* ステータスピル（常時・コンパクト・上部中央） */
.plaque{ position:fixed; top:calc(10px + env(safe-area-inset-top, 0px)); left:50%;
  transform:translateX(-50%); z-index:32; max-width:min(56vw, 360px);
  background:linear-gradient(rgba(34,26,68,.82), rgba(22,16,41,.82));
  border:1.5px solid var(--gold); border-radius:999px;
  padding:7px 22px; text-align:center; box-shadow:0 6px 20px rgba(0,0,0,.5); }
.plaque b{ display:block; font-size:16px; letter-spacing:.2em; color:#f0e2ae; }
.plaque .sub{ display:block; margin-top:2px; font-size:12px; letter-spacing:.06em; color:var(--violet); min-height:15px; }
/* アクションバー（ボタン群・非選択時は非表示） */
#actionBar{ position:fixed; z-index:33; display:flex; gap:12px; justify-content:center;
  left:50%; transform:translateX(-50%);
  top:calc(52px + env(safe-area-inset-top, 0px)); width:min(94vw, 560px); }
#actionBar.hidden{ display:none; }
#actionBar .btn{ flex:1 1 40%; min-height:56px; font-size:17px; padding:12px 10px; border-radius:12px;
  background:linear-gradient(rgba(58,47,107,.96),rgba(36,28,74,.96)); box-shadow:0 8px 22px rgba(0,0,0,.5); }
.btn{ font-family:inherit; background:linear-gradient(#3a2f6b,#241c4a); color:#f0e2ae;
  border:1.5px solid var(--gold); border-radius:9px; padding:8px 16px; font-size:13px;
  letter-spacing:.12em; cursor:pointer; }
.btn:hover{ filter:brightness(1.25); }
.btn:disabled{ opacity:.35; cursor:default; filter:none; }
.btn.warn{ background:linear-gradient(#6b2f2f,#4a1c1c); }

.diceArea{ position:absolute; left:0; top:44px; width:100%; display:flex; justify-content:center;
  gap:16px; transform-style:preserve-3d; pointer-events:none; }
.die{ position:relative; width:36px; height:36px; transform-style:preserve-3d;
  animation:dspin 16s linear infinite; }
@keyframes dspin{ from{ transform:translateZ(18px) rotateZ(0deg);} to{ transform:translateZ(18px) rotateZ(360deg);} }
.f{ position:absolute; inset:0; background:#f2ead8; border:2px solid #b8a888; border-radius:7px; }
.ft{ transform:translateZ(18px); } .fb{ transform:rotateX(180deg) translateZ(18px); }
.fn{ transform:rotateX(90deg) translateZ(18px); } .fs{ transform:rotateX(-90deg) translateZ(18px); }
.fe{ transform:rotateY(90deg) translateZ(18px); } .fw{ transform:rotateY(-90deg) translateZ(18px); }
.p1{ background-image:radial-gradient(circle 4px at 50% 50%, #4a3620 98%, transparent); }
.p2{ background-image:radial-gradient(circle 4px at 27% 27%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 73% 73%, #4a3620 98%, transparent); }
.p3{ background-image:radial-gradient(circle 4px at 24% 24%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 50% 50%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 76% 76%, #4a3620 98%, transparent); }
.p4{ background-image:radial-gradient(circle 4px at 27% 27%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 73% 27%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 27% 73%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 73% 73%, #4a3620 98%, transparent); }
.p5{ background-image:radial-gradient(circle 4px at 24% 24%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 76% 24%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 50% 50%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 24% 76%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 76% 76%, #4a3620 98%, transparent); }
.p6{ background-image:radial-gradient(circle 4px at 28% 22%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 28% 50%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 28% 78%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 72% 22%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 72% 50%, #4a3620 98%, transparent),
     radial-gradient(circle 4px at 72% 78%, #4a3620 98%, transparent); }

.hand{ position:fixed; left:50%; z-index:20; display:flex; }
.opp-hand{ top:calc(-52px * var(--fit)); transform:translateX(-50%); }
.opp-hand .hc{ width:calc(92px * var(--fit)); height:calc(129px * var(--fit));
  margin:0 calc(-14px * var(--fit)); transform:rotate(180deg); opacity:.92; }
.my-hand{ bottom:calc(-30px * var(--fit)); transform:translateX(-50%); }
.my-hand .hc{ width:calc(148px * var(--fit)); height:calc(207px * var(--fit));
  margin:0 calc(-16px * var(--fit)); position:relative; }
.my-hand .hcInner{ width:100%; height:100%; transition:transform .2s ease, filter .2s ease;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.55)); cursor:pointer; }
.my-hand .hc:hover{ z-index:9; }
.my-hand .hc:hover .hcInner{ transform:translateY(-50px) scale(1.15); }
.my-hand .hc.sel{ z-index:10; }
.my-hand .hc.sel .hcInner{ transform:translateY(-62px) scale(1.18);
  filter:drop-shadow(0 0 14px rgba(232,195,74,.9)) drop-shadow(0 18px 26px rgba(0,0,0,.6)); }
.my-hand .hc.inert .hcInner{ filter:grayscale(.6) brightness(.75); cursor:default; }
.my-hand .hc.locked .hcInner{ cursor:default; }
.hc svg{ width:100%; height:100%; display:block; border-radius:10px; }

#log{ position:fixed; right:calc(14px + env(safe-area-inset-right, 0px));
  top:calc(64px + env(safe-area-inset-top, 0px)); width:min(30vw, 236px); max-height:46vh; z-index:34;
  overflow-y:auto; display:flex; flex-direction:column; gap:5px; padding:10px;
  background:rgba(14,9,28,.82); border:1px solid rgba(155,138,224,.3); border-radius:12px;
  font-size:12px; line-height:1.55; scrollbar-width:thin; pointer-events:auto; }
#log div{ border-bottom:1px dotted rgba(155,138,224,.18); padding-bottom:4px; }
#log .sys{ color:#d8b95a; } #log .me{ color:#c9bdf0; } #log .op{ color:#e09a9a; }

.overlay{ position:fixed; inset:0; z-index:50; display:grid; place-items:center;
  background:rgba(8,5,18,.62); backdrop-filter:blur(2px); }
.overlay.hidden{ display:none; }
.panel{ background:linear-gradient(#241c4a,#140f2c); border:2px solid var(--gold); border-radius:16px;
  padding:30px 40px; text-align:center; max-width:520px; box-shadow:0 24px 60px rgba(0,0,0,.7); }
.panel h2{ margin:0 0 6px; font-size:26px; letter-spacing:.3em; color:#f0e2ae; font-weight:600; }
.panel p{ margin:8px 0 0; font-size:13px; letter-spacing:.08em; color:var(--violet); line-height:1.9; }
.panel .btns{ display:flex; gap:12px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
.panel .droll{ display:inline-grid; place-items:center; width:64px; height:64px; margin:14px 10px 0;
  background:#f2ead8; border-radius:12px; font-size:30px; color:#4a3620; font-weight:bold;
  font-family:Georgia,serif; box-shadow:0 6px 14px rgba(0,0,0,.5); }
.panel .big{ font-size:38px; letter-spacing:.34em; }
.panel .win{ color:#e8c34a; } .panel .lose{ color:#d86a6a; }
.codebox{ width:100%; height:64px; margin-top:10px; font-size:10px; font-family:monospace;
  background:#0d0a1e; color:#c9bdf0; border:1px solid rgba(155,138,224,.4); border-radius:8px;
  padding:6px 8px; resize:none; }

#picker{ position:fixed; inset:0; z-index:48; display:flex; flex-direction:column;
  background:rgba(8,5,18,.94); backdrop-filter:blur(3px);
  padding:calc(12px + env(safe-area-inset-top, 0px)) calc(16px + env(safe-area-inset-right, 0px))
          calc(14px + env(safe-area-inset-bottom, 0px)) calc(16px + env(safe-area-inset-left, 0px)); }
#picker.hidden{ display:none; }
#picker h3{ margin:2px 0 6px; text-align:center; font-size:17px; letter-spacing:.22em;
  color:#f0e2ae; font-weight:600; flex:0 0 auto; }
#picker .cards{ flex:1 1 auto; min-height:0; display:flex; gap:16px; overflow-x:auto; overflow-y:hidden;
  align-items:center; padding:6px 4px; -webkit-overflow-scrolling:touch; }
#picker .cards > :first-child{ margin-left:auto; }
#picker .cards > :last-child{ margin-right:auto; }
/* カードは利用可能な高さいっぱいに拡大（横スクロールで全カード閲覧） */
#picker .pcard{ flex:0 0 auto; position:relative; cursor:pointer; transition:transform .15s ease;
  height:100%; max-height:min(74vh, 460px); width:auto; aspect-ratio:300/420; border-radius:12px; }
#picker .pcard svg{ width:100%; height:100%; display:block; border-radius:12px;
  box-shadow:0 10px 26px rgba(0,0,0,.6); }
#picker .pcard.sel{ transform:scale(1.05);
  box-shadow:0 0 0 3px var(--gold), 0 0 26px rgba(232,195,74,.8); }
#picker .pcard.inert{ filter:grayscale(.6) brightness(.7); cursor:default; }
#picker .pcard .plabel{ position:absolute; left:6%; right:6%; bottom:5%; text-align:center;
  font-size:12px; letter-spacing:.06em; color:#fff; background:rgba(10,6,20,.82);
  border:1px solid rgba(201,162,39,.5); border-radius:7px; padding:4px 0; }
#picker .pbtns{ flex:0 0 auto; display:flex; gap:12px; margin-top:6px; }
#picker .pbtns .btn{ flex:1; min-height:52px; font-size:17px; border-radius:12px; }
.hint{ position:fixed; bottom:calc(12px + env(safe-area-inset-bottom, 0px));
  left:calc(18px + env(safe-area-inset-left, 0px)); z-index:30; font-size:11px; letter-spacing:.12em;
  color:rgba(156,146,189,.85); }
#rotateHint{ display:none; position:fixed; inset:0; z-index:90;
  background:radial-gradient(120% 90% at 50% 30%, #1c1533 0%, #0b0817 70%);
  place-items:center; text-align:center; }
#rotateHint .inner{ color:var(--ink); }
#rotateHint .ph{ font-size:56px; display:inline-block; animation:rotph 2s ease-in-out infinite; }
@keyframes rotph{ 0%,20%{ transform:rotate(0) } 55%,80%{ transform:rotate(90deg) } 100%{ transform:rotate(90deg) } }
#rotateHint p{ margin-top:18px; font-size:15px; letter-spacing:.2em; color:var(--violet); }
@media (orientation:portrait) and (max-width:760px) and (pointer:coarse){
  #rotateHint{ display:grid; }
}
/* 狭い画面: 手札の扇は隠しピッカーに任せる（ボタンと重ならないように） */
/* スマホ横持ちはCSS幅が900pxを超える機種が多い（例: 932px）。
   幅が狭い or 高さが低い（＝横持ちスマホ）を「モバイル」とみなす */
@media (max-width:900px), (max-height:560px){
  /* 手札は常に画面下部に表示（コマンドには含めない） */
  .my-hand{ display:flex; bottom:calc(2px + env(safe-area-inset-bottom, 0px)); z-index:35; }
  .my-hand .hc{ width:104px; height:146px; margin:0 -8px; }
  .my-hand .hc.sel .hcInner{ transform:translateY(-26px) scale(1.12); }
  .hint{ display:none; }
  .brand{ display:none; }               /* プレイ中は装飾ロゴを隠して上部を空ける */
  .hud{ justify-content:flex-end; }     /* 音声・視点操作は右上に固定 */
  /* ログは右上へ（操作パネルを左に置くため） */
  #log{ width:min(34vw, 190px); font-size:11px; max-height:38vh;
    right:calc(8px + env(safe-area-inset-right, 0px)); left:auto;
    top:calc(56px + env(safe-area-inset-top, 0px)); }
  .plaque{ left:calc(8px + env(safe-area-inset-left, 0px)); transform:none; max-width:min(46vw, 260px); }
  /* 操作パネルは左端に縦置き。盤面は常に見える */
  #actionBar{ top:50%; bottom:auto; right:auto; transform:translateY(-50%);
    left:calc(8px + env(safe-area-inset-left, 0px)); flex-direction:column;
    width:auto; gap:10px; }
  #actionBar .btn{ flex:0 0 auto; min-height:0; padding:14px 18px; font-size:15px;
    white-space:nowrap; min-width:132px;
    background:linear-gradient(rgba(58,47,107,.9),rgba(36,28,74,.9)); }
}

#fx{ position:fixed; inset:0; z-index:45; pointer-events:none; overflow:hidden; }
.fxp{ position:absolute; will-change:transform,opacity; }
.fxring{ position:absolute; border-radius:50%; will-change:transform,opacity; }
.fxflash{ position:absolute; inset:0; }
.fxpop{ position:absolute; transform:translate(-50%,-50%); font-weight:bold; font-size:30px;
  letter-spacing:.1em; text-shadow:0 2px 12px rgba(0,0,0,.85); will-change:transform,opacity; }
.fxcard{ position:fixed; left:50%; top:44%; width:min(250px,42vmin);
  transform:translate(-50%,-50%); will-change:transform,opacity; }
.fxcard svg{ width:100%; height:auto; display:block; border-radius:12px; }
.fxslash{ position:absolute; height:5px; border-radius:3px;
  background:linear-gradient(90deg,transparent,#fff,transparent);
  box-shadow:0 0 16px #fff; will-change:transform,opacity; }
.fxdim{ position:absolute; inset:0; opacity:0;
  background:radial-gradient(circle at 50% 50%, rgba(5,3,12,.55), rgba(5,3,12,.82)); }
/* ── ちび3Dキャラ（CSSボクセル） ── */
.chb{ position:absolute; width:120px; height:150px; margin-left:-60px; margin-top:-75px;
  perspective:800px; pointer-events:none; will-change:transform,opacity; }
.chb-tilt, .chb-inner{ position:absolute; inset:0; transform-style:preserve-3d; }
.chb .jnt{ position:absolute; width:0; height:0; transform-style:preserve-3d; }
.chb .swing{ position:absolute; width:0; height:0; transform-style:preserve-3d;
  transform-origin:0 2px; }
.c3box{ position:absolute; transform-style:preserve-3d; }
.c3f{ position:absolute; left:50%; top:50%; }
.chb-shadow{ position:absolute; left:50%; bottom:2px; width:74px; height:16px; margin-left:-37px;
  border-radius:50%; background:radial-gradient(50% 50% at 50% 50%, rgba(0,0,0,.5), transparent 75%); }
.chb-cape{ position:absolute; width:38px; height:44px; margin-left:-19px; margin-top:-8px;
  background:linear-gradient(#a82828,#6b1f1f); border-radius:0 0 12px 12px;
  transform:translateZ(-14px); }

<script>
(function(){
'use strict';
/* ============================== データ定義 ============================== */
var STRIKERS = {
  hero:    { name:'英雄', energy:2 },
  spirit:  { name:'精霊', energy:1 },
  monster: { name:'怪物', energy:3 }
};
var SPELLS = { curse:'呪詛', cyclone:'竜巻', heal:'治癒', cancel:'取消', growth:'成長', aging:'老化' };
var MAX_GUARDS = 10;
var uidSeq = 0;
var WG_VERSION = '2026.07.09e';

var S = null;      // ゲーム状態
var UI = { sel:-1, summon:false, busy:false };
var MY = 0, OP = 1;                       // 自分/相手のプレイヤー番号（ゲストは1/0）
var NET = { mode:'ai', pc:null, dc:null } // 通信状態
var pendingWait = {}, inbox = [];
var rng = Math.random;                    // 対戦相手と共有するシード付き乱数

function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function nameOf(p){ return p===MY ? 'あなた' : '相手'; }
function clsOf(p){ return p===MY ? 'me' : 'op'; }

function newState(){
  var deck = [];
  Object.keys(SPELLS).forEach(function(sp){ for(var i=0;i<5;i++) deck.push(sp); });
  shuffle(deck);
  return {
    deck: deck, discard: [],
    players: [ mkPlayer(), mkPlayer() ],   // 0=あなた 1=相手
    turn: 0, turnCount: 0, turnsTaken: [0,0],
    first: 0, second: 1, castsLeft: 0, over: false
  };
}
function mkPlayer(){ return { guards: MAX_GUARDS, hand: [], waiting: ['hero','spirit','monster'], field: [] }; }
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(rng()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
function $(id){ return document.getElementById(id); }

/* ============================== ログ ============================== */
function log(msg, cls){
  var d = document.createElement('div');
  d.className = cls || 'sys';
  d.textContent = msg;
  var box = $('log');
  box.insertBefore(d, box.firstChild);
  while(box.children.length > 80) box.removeChild(box.lastChild);
}

/* ============================== オーディオ ============================== */
var AC=null, sfxBus=null, musBus=null, melDelay=null, noiseData=null;
var MUS_VOL = .22;
var audioPref = { bgm:true, sfx:true };
try{ var _ap = localStorage.getItem('wg-audio'); if(_ap) audioPref = JSON.parse(_ap); }catch(e){}
function savePref(){ try{ localStorage.setItem('wg-audio', JSON.stringify(audioPref)); }catch(e){} }
function ensureAudio(){
  var Ctx = window.AudioContext || window.webkitAudioContext;
  if(!Ctx) return;
  if(!AC){
    AC = new Ctx();
    sfxBus = AC.createGain(); sfxBus.gain.value = audioPref.sfx ? .5 : 0; sfxBus.connect(AC.destination);
    musBus = AC.createGain(); musBus.gain.value = audioPref.bgm ? MUS_VOL : 0; musBus.connect(AC.destination);
    melDelay = AC.createDelay(1); melDelay.delayTime.value = .42;
    var fb = AC.createGain(); fb.gain.value = .32;
    melDelay.connect(fb); fb.connect(melDelay); melDelay.connect(musBus);
    startBGM();
  }
  if(AC.state === 'suspended') AC.resume();
}
window.wgAudioState = function(){ return AC ? AC.state : 'uninitialized'; };
function tone(o){
  if(!AC) return;
  var t0 = o.when || AC.currentTime;
  var osc = AC.createOscillator();
  osc.type = o.t || 'sine';
  osc.frequency.setValueAtTime(o.f, t0);
  if(o.f2) osc.frequency.exponentialRampToValueAtTime(Math.max(o.f2, 1), t0 + (o.d || .3));
  var g = AC.createGain();
  var a = o.a || .005, d = o.d || .3, v = o.v || .3;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(v, t0 + a);
  g.gain.exponentialRampToValueAtTime(.0001, t0 + d);
  osc.connect(g); g.connect(o.bus || sfxBus);
  if(o.echo) g.connect(melDelay);
  osc.start(t0); osc.stop(t0 + d + .1);
}
function noise(o){
  if(!AC) return;
  if(!noiseData){
    noiseData = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
    var ch = noiseData.getChannelData(0);
    for(var i=0;i<ch.length;i++) ch[i] = Math.random()*2 - 1;
  }
  var t0 = o.when || AC.currentTime, d = o.d || .2, v = o.v || .3;
  var src = AC.createBufferSource(); src.buffer = noiseData; src.loop = true;
  var f = AC.createBiquadFilter(); f.type = o.ft || 'bandpass'; f.Q.value = o.q || .8;
  f.frequency.setValueAtTime(o.f || 1000, t0);
  if(o.f2) f.frequency.exponentialRampToValueAtTime(o.f2, t0 + d);
  var g = AC.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(v, t0 + (o.a || .01));
  g.gain.exponentialRampToValueAtTime(.0001, t0 + d);
  src.connect(f); f.connect(g); g.connect(o.bus || sfxBus);
  src.start(t0); src.stop(t0 + d + .1);
}
function sfx(name){
  if(!AC || !audioPref.sfx) return;
  var t = AC.currentTime;
  switch(name){
    case 'click':
      tone({f:520, d:.05, v:.09, t:'triangle'});
      tone({f:130, d:.07, v:.08}); break;
    case 'draw':
      noise({d:.22, f:900, f2:2600, v:.25});
      tone({f:98, d:.12, v:.1}); break;
    case 'summon':
      tone({f:98, f2:196, d:.5, t:'sawtooth', v:.2});
      tone({f:49, d:.45, v:.3});
      noise({d:.3, f:180, f2:90, v:.3, when:t+.22});
      tone({f:392, d:.3, t:'triangle', v:.12, when:t+.25}); break;
    case 'cast':
      tone({f:440, f2:1760, d:.35, t:'triangle', v:.13});
      noise({d:.3, f:2400, f2:5200, v:.08});
      tone({f:110, d:.3, v:.12}); break;
    case 'curse':
      tone({f:165, f2:55, d:1.1, t:'sawtooth', v:.2});
      tone({f:175, f2:58, d:1.1, t:'sawtooth', v:.16});
      tone({f:41, d:1.0, a:.15, v:.3});
      noise({d:.8, f:200, f2:60, v:.2, q:1.5}); break;
    case 'cyclone':
      noise({d:1.3, f:300, f2:2000, v:.35, q:1.1});
      noise({d:1.2, f:90, v:.3, q:.6});
      tone({f:55, d:1.1, a:.3, v:.22}); break;
    case 'heal':
      [392, 523.25, 659.25, 783.99, 1046.5].forEach(function(f,i){
        tone({f:f, d:.7, t:'triangle', v:.14, when:t+i*.1});
      });
      tone({f:130.81, d:1.4, a:.3, v:.13});
      tone({f:196, d:1.4, a:.3, v:.1}); break;

function strings(freqs, when, dur){
  freqs.forEach(function(fr){
    [-6, 5].forEach(function(cents){
      var o = AC.createOscillator(); o.type = 'sawtooth';
      o.frequency.value = fr * Math.pow(2, cents/1200);
      var flt = AC.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 900; flt.Q.value = .5;
      var g = AC.createGain();
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(.028, when+.6);
      g.gain.setValueAtTime(.028, when+dur-.5);
      g.gain.linearRampToValueAtTime(.0001, when+dur);
      o.connect(flt); flt.connect(g); g.connect(musBus);
      o.start(when); o.stop(when+dur+.1);
    });
  });
}
function hornNote(freq, when, dur){
  var vol = .085;
  var o = AC.createOscillator(); o.type = 'sawtooth'; o.frequency.setValueAtTime(freq, when);
  var lfo = AC.createOscillator(); lfo.frequency.value = 5;
  var lg = AC.createGain(); lg.gain.setValueAtTime(0, when);
  lg.gain.linearRampToValueAtTime(freq*.006, when+.35);
  lfo.connect(lg); lg.connect(o.frequency);
  var flt = AC.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 1100;
  var g = AC.createGain();
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vol, when+.09);
  g.gain.setValueAtTime(vol*.85, Math.max(when+.1, when+dur-.2));
  g.gain.exponentialRampToValueAtTime(.0001, when+dur+.15);
  o.connect(flt); flt.connect(g); g.connect(musBus); g.connect(melDelay);
  var s = AC.createOscillator(); s.frequency.setValueAtTime(freq/2, when);
  var sg = AC.createGain(); sg.gain.setValueAtTime(0, when);
  sg.gain.linearRampToValueAtTime(vol*.5, when+.09);
  sg.gain.exponentialRampToValueAtTime(.0001, when+dur+.1);
  s.connect(sg); sg.connect(musBus);

var bgmBar = 0, bgmLoop = 0, bgmNextBar = 0;
function scheduleBar(t){
  var full = (bgmLoop % 2 === 0);   // 主題入りの小節群と静かな小節群を交互に
  var pg = BGM_PROG[bgmBar];
  strings(pg.chord, t, BGM_BAR*1.05);
  tone({f:pg.bass, t:'triangle', d:BGM_BAR, a:.25, v:.07, when:t, bus:musBus});
  tone({f:pg.bass/2, d:BGM_BAR, a:.25, v:.06, when:t, bus:musBus});
  timpani(t, full ? .19 : .11);
  timpani(t+2*BGM_BEAT, full ? .11 : .07);
  if(bgmBar===3 || bgmBar===7){
    for(var i=0;i<6;i++) timpani(t+3*BGM_BEAT+i*(BGM_BEAT/6), .04+.028*i);
    cymSwell(t+BGM_BAR-1.4, 1.4, .045);
  }
  if(full){
    BGM_THEME.forEach(function(n){
      if(n[0]===bgmBar) hornNote(n[3], t+n[1]*BGM_BEAT, n[2]*BGM_BEAT*.92);
    });
  }
  bgmBar++;
  if(bgmBar>=8){ bgmBar=0; bgmLoop++; }
}
function startBGM(){
  bgmNextBar = AC.currentTime + .15;
  setInterval(function(){
    while(bgmNextBar < AC.currentTime + 1.2){
      scheduleBar(bgmNextBar);
      bgmNextBar += BGM_BAR;
    }
  }, 400);
}

function converge(x, y, color){
  if(REDUCED) return;
  for(var i=0;i<12;i++){
    var p = document.createElement('div'); p.className = 'fxp';
    var ang = Math.random()*Math.PI*2, dist = 90+Math.random()*70;
    var sx = x+Math.cos(ang)*dist, sy = y+Math.sin(ang)*dist;
    var size = 3+Math.random()*5;
    p.style.cssText = 'left:'+sx+'px;top:'+sy+'px;width:'+size+'px;height:'+size+
      'px;border-radius:50%;background:'+color+';box-shadow:0 0 '+(size*2)+'px '+color;
    fxLayer.appendChild(p);
    var anim = p.animate([
      { transform:'translate(-50%,-50%)', opacity:0 },
      { opacity:1, offset:.3 },
      { transform:'translate(calc(-50% + '+(x-sx)+'px), calc(-50% + '+(y-sy)+'px)) scale(.4)', opacity:0 }
    ], { duration:600+Math.random()*300, easing:'ease-in', delay:Math.random()*300, fill:'backwards' });
    fxRemove(p, anim);
  }
}
function streakTrail(x1, y1, x2, y2, color){
  if(REDUCED) return;
  var ang = Math.atan2(y2-y1, x2-x1)*180/Math.PI;
  for(var i=0;i<6;i++){
    var f = i/6;
    var d = document.createElement('div');
    d.className = 'fxstreak';
    d.style.cssText = 'left:'+(x1+(x2-x1)*f)+'px;top:'+(y1+(y2-y1)*f)+'px;width:'+(60+Math.random()*60)+
      'px;background:linear-gradient(90deg,transparent,'+color+',transparent);transform:translate(-50%,-50%) rotate('+ang+'deg);';
    fxLayer.appendChild(d);
    var anim = d.animate([{opacity:0},{opacity:.9,offset:.3},{opacity:0}],
      { duration:380, delay:i*40, fill:'backwards' });
    fxRemove(d, anim);
  }
}
function fxArc(x, y, dir, sc){

function attackCinematic(p, attackers, targetEl){

    // ③ 敵の横まで走り込み（3/4アングル）→ 振りかぶりタメ → 振り下ろし（1体ずつ）

    figs.forEach(function(f, idx){

      setTimeout(function(){
        sfx('dash');
        f.fig.classList.remove('idle'); f.fig.classList.add('run');
        var innerEl = f.fig.querySelector('.chb-inner');

          { transform:'translate('+(px-f.c0.x)+'px,'+(py-f.c0.y)+'px) scale('+s2+')' }

      }, start);
      setTimeout(function(){

        burst(tc.x, tc.y, {n:18, colors:[f.color,'#fff','#ffd27a'], dist:110, spark:true, size:7, dur:600});
        ring(tc.x, tc.y, f.color, 130);

      setTimeout(function(){
        // 小さく飛び退いてから消える

        f.fig.animate([
          { transform:'translate('+(px-f.c0.x+dir*42*CS)+'px,'+(py-f.c0.y)+'px) scale('+s2+')', opacity:1 },
          { transform:'translate('+(px-f.c0.x-dir*60*CS)+'px,'+(py-f.c0.y-24*CS)+'px) scale('+(s2*.93)+')', opacity:1, offset:.5 },
          { transform:'translate('+(px-f.c0.x-dir*80*CS)+'px,'+(py-f.c0.y)+'px) scale('+(s2*.9)+')', opacity:0 }

    var endAt = dashAt + (n-1)*gap + dashDur + 1550;
    setTimeout(function(){
      if(sceneEl){ document.documentElement.style.setProperty('--camZoom','1'); setTimeout(function(){ sceneEl.classList.remove('cam'); }, 650); }

      setTimeout(function(){ if(dim.parentNode) dim.remove(); }, 900);

/* ============================== 基本操作 ============================== */
function draw(p){
  if(!S.deck.length && S.discard.length){
    S.deck = shuffle(S.discard.slice()); S.discard = [];
    log('捨札を混ぜ直して山札にした');
  }
  if(!S.deck.length){ log('山札にカードがない！'); return null; }
  var c = S.deck.pop();
  sfx('draw');
  S.players[p].hand.push(c);
  log(nameOf(p) + 'はカードを1枚引いた', clsOf(p));
  return c;
}
function summon(p, type){
  var w = S.players[p].waiting;
  var i = w.indexOf(type);
  if(i < 0) return false;
  w.splice(i,1);
  S.players[p].field.push({ type:type, energy:STRIKERS[type].energy, enteredTurn:S.turnCount, uid:++uidSeq });
  sfx('summon');
  log(nameOf(p) + 'は「' + STRIKERS[type].name + '」を戦場に送った', clsOf(p));
  return true;
}
function findStriker(t){
  if(!t) return null;
  var f = S.players[t.owner].field;
  for(var i=0;i<f.length;i++) if(f[i].uid===t.uid) return f[i];
  return null;
}
function removeFromField(owner, uid, cause){
  var f = S.players[owner].field;
  for(var i=0;i<f.length;i++){
    if(f[i].uid===uid){
      var el0 = spotOf({owner:owner, uid:uid});
      var pos0 = el0 ? centerOf(el0) : null;
      var s = f.splice(i,1)[0];
      S.players[owner].waiting.push(s.type);
      sfx('retreat');
      log(nameOf(owner) + 'の「' + STRIKERS[s.type].name + '」は待機場所に戻った（' + cause + '）', clsOf(owner));
      if(s.type==='hero'){
        var pl = S.players[owner];
        if(pl.guards < MAX_GUARDS){
          pl.guards++;
          heroReturnCinematic(owner, pos0);   // 護衛カードへ歩いて加わる（到着時にチャイム）
          log('英雄の加護 ── ' + nameOf(owner) + 'の護衛が1人増えた');
        }
      }
      return true;
    }
  }
  return false;
}
function legalTargets(caster, spell){
  var me = S.players[caster], en = S.players[1-caster];
  if(spell==='curse')  return en.field.filter(function(s){ return s.type!=='spirit'; }).map(function(s){ return {owner:1-caster, uid:s.uid}; });
  if(spell==='aging')  return en.field.map(function(s){ return {owner:1-caster, uid:s.uid}; });
  if(spell==='growth') return me.field.map(function(s){ return {owner:caster, uid:s.uid}; });
  return null; // 対象を取らない
}
function needsTarget(sp){ return sp==='curse'||sp==='aging'||sp==='growth'; }
function targetLabel(t){
  var s = findStriker(t);
  if(!s) return '(不明)';
  return nameOf(t.owner) + 'の' + STRIKERS[s.type].name + '(' + s.energy + ')';
}

/* ============================== スペル解決（連鎖） ============================== */
function applySpell(item){
  var who = nameOf(item.caster);
  var cls = clsOf(item.caster);
  var fxEl, fxP;
  switch(item.spell){
    case 'curse': {
      var t = findStriker(item.target);
      if(!t){ log('「呪詛」は対象を失い不発に終わった'); break; }
      if(t.type==='spirit'){ log('精霊は呪詛の対象にならない ── 不発'); break; }
      sfx('curse');
      fxEl = spotOf(item.target);
      if(fxEl){ fxP = centerOf(fxEl);
        burst(fxP.x, fxP.y, {n:26, colors:['#b36bff','#7a3fc0','#241238'], dist:110, size:10, dur:850});
        ring(fxP.x, fxP.y, '#b36bff', 130);
      }
      flash('#7a3fc0', .22, 500); shake(false);
      log(who + 'の「呪詛」！', cls);
      removeFromField(item.target.owner, item.target.uid, '呪詛');
      break;
    }
    case 'cyclone': {
      var op = S.players[1-item.caster];
      var before = op.guards;
      op.guards = Math.max(0, op.guards-3);
      sfx('cyclone');
      fxEl = guardSpotOf(1-item.caster); fxP = centerOf(fxEl);
      burst(fxP.x, fxP.y, {n:30, colors:['#9fd8e8','#5a8a9c','#e8f4f8'], dist:140, dur:900, drift:-20});
      ring(fxP.x, fxP.y, '#9fd8e8', 160);
      flash('#5a8a9c', .18, 500); shake(true);
      popText(fxP.x, fxP.y-30, '-'+(before-op.guards), '#9fd8e8');
      log(who + 'の「竜巻」！ ' + nameOf(1-item.caster) + 'の護衛を' + (before-op.guards) + '体倒した（残り' + op.guards + '）', cls);
      break;
    }
    case 'heal': {
      var pl = S.players[item.caster];
      var b = pl.guards;
      pl.guards = Math.min(MAX_GUARDS, pl.guards+3);
      sfx('heal');
      fxEl = guardSpotOf(item.caster); fxP = centerOf(fxEl);
      rise(fxP.x, fxP.y, {n:18, colors:['#ffe9a8','#fff8e0','#caa84e']});
      flash('#caa84e', .14, 600);
      popText(fxP.x, fxP.y-30, '+'+(pl.guards-b), '#ffe9a8');
      log(who + 'の「治癒」！ 護衛が' + (pl.guards-b) + '体復活した（計' + pl.guards + '）', cls);
      break;
    }
    case 'growth': {
      var g = findStriker(item.target);
      if(!g){ log('「成長」は対象を失い不発に終わった'); break; }
      g.energy++;
      sfx('growth');
      fxEl = spotOf(item.target);
      if(fxEl){ fxP = centerOf(fxEl);
        rise(fxP.x, fxP.y, {n:14, colors:['#8ef0a8','#e8ffe9']});
        ring(fxP.x, fxP.y, '#8ef0a8', 110);
        popText(fxP.x, fxP.y-40, '+1', '#8ef0a8');
      }
      log(who + 'の「成長」！ ' + STRIKERS[g.type].name + 'のエネルギーが' + g.energy + 'になった', cls);
      break;
    }
    case 'aging': {
      var a = findStriker(item.target);
      if(!a){ log('「老化」は対象を失い不発に終わった'); break; }
      a.energy--;
      sfx('aging');
      fxEl = spotOf(item.target);
      if(fxEl){ fxP = centerOf(fxEl);
        burst(fxP.x, fxP.y, {n:18, colors:['#d4b36a','#8a6a30'], dist:60, dur:900, drift:70, size:6});
        popText(fxP.x, fxP.y-40, '-1', '#d4b36a');
      }
      log(who + 'の「老化」！ ' + STRIKERS[a.type].name + 'のエネルギーが' + a.energy + 'になった', cls);
      if(a.energy<=0) removeFromField(item.target.owner, item.target.uid, 'エネルギー0');
      break;
    }
  }
}
async function castSpellFlow(caster, handIndex, target){
  var hand = S.players[caster].hand;
  var spell = hand.splice(handIndex,1)[0];
  var chain = [{ caster:caster, spell:spell, target:target||null, cancelled:false }];
  sfx('cast');
  log(nameOf(caster) + 'は「' + SPELLS[spell] + '」を唱えた' +
      (target ? ' → 対象: ' + targetLabel(target) : ''), clsOf(caster));
  render();
  await fxCastReveal(spell);
  // 対応の連鎖
  var responder = 1-caster;
  while(true){
    var resp;
    if(NET.mode==='ai'){
      if(responder===0) resp = await humanReaction(chain);
      else { await sleep(650); resp = aiReaction(chain); }
    } else if(responder===MY){
      resp = await humanReaction(chain);
      netSend({t:'react', resp:resp});
    } else {
      var rm = await waitMsg('react');
      resp = rm.resp;
    }
    if(!resp) break;
    var rHand = S.players[responder].hand;
    var sp = rHand.splice(resp.index,1)[0];
    chain.push({ caster:responder, spell:sp, target:resp.target||null, cancelled:false });
    sfx('cast');
    log(nameOf(responder) + 'は対応して「' + SPELLS[sp] + '」を唱えた' +
        (resp.target ? ' → 対象: ' + targetLabel(resp.target) : ''), clsOf(responder));
    render();
    await fxCastReveal(sp);
    responder = 1-responder;
  }
  // LIFO解決
  for(var i=chain.length-1; i>=0; i--){
    var item = chain[i];
    if(item.cancelled){ log('「' + SPELLS[item.spell] + '」は無効化された'); continue; }
    if(item.spell==='cancel'){
      if(i>0){ chain[i-1].cancelled = true;
        sfx('cancel');
        flash('#7fdcff', .2, 400);
        burst(innerWidth/2, innerHeight*.44, {n:22, colors:['#7fdcff','#fff','#2a7ab0'], dist:130, spark:true, size:7, dur:600});
        ring(innerWidth/2, innerHeight*.44, '#7fdcff', 170);
        log(nameOf(item.caster) + 'の「取消」！ 「' + SPELLS[chain[i-1].spell] + '」を打ち消した', clsOf(item.caster)); }
      continue;
    }
    applySpell(item);
    render();
    await sleep(700);
  }
  chain.forEach(function(it){ S.discard.push(it.spell); });
  render();
}

/* ============================== 人間の対応ウィンドウ ============================== */
function humanReaction(chain){
  return new Promise(function(resolve){
    var hand = S.players[MY].hand;
    if(!hand.length || S.over){ resolve(null); return; }
    var last = chain[chain.length-1];
    var panel = $('overlayPanel');
    function close(v){ $('overlay').classList.add('hidden'); resolve(v); }
    function baseView(){
      panel.innerHTML = '';
      var h = document.createElement('h2'); h.textContent = '対応チャンス'; h.style.fontSize='20px';
      var p = document.createElement('p');
      p.textContent = nameOf(last.caster) + 'が「' + SPELLS[last.spell] + '」を唱えた' +
        (last.target ? '（対象: ' + targetLabel(last.target) + '）' : '') + '。手札から対応できます。';
      var btns = document.createElement('div'); btns.className='btns';
      hand.forEach(function(sp, idx){
        var b = document.createElement('button'); b.className='btn';
        b.textContent = SPELLS[sp];
        var tg = needsTarget(sp) ? legalTargets(MY, sp) : null;
        if(needsTarget(sp) && (!tg || !tg.length)) b.disabled = true;
        b.onclick = function(){
          if(!needsTarget(sp)){ close({index:idx, target:null}); return; }
          targetView(sp, idx, tg);
        };
        btns.appendChild(b);
      });
      var skip = document.createElement('button'); skip.className='btn warn';
      skip.textContent = '対応しない';
      skip.onclick = function(){ close(null); };
      btns.appendChild(skip);
      panel.appendChild(h); panel.appendChild(p); panel.appendChild(btns);
    }
    function targetView(sp, idx, tg){
      panel.innerHTML = '';
      var h = document.createElement('h2'); h.textContent = '「' + SPELLS[sp] + '」の対象'; h.style.fontSize='20px';
      var btns = document.createElement('div'); btns.className='btns';
      tg.forEach(function(t){
        var b = document.createElement('button'); b.className='btn';
        b.textContent = targetLabel(t);
        b.onclick = function(){ close({index:idx, target:t}); };
        btns.appendChild(b);
      });
      var back = document.createElement('button'); back.className='btn warn'; back.textContent='戻る';
      back.onclick = baseView;
      btns.appendChild(back);
      panel.appendChild(h); panel.appendChild(btns);
    }
    baseView();
    sfx('alert');
    $('overlay').classList.remove('hidden');
  });
}

/* ============================== AI ============================== */
function aiReaction(chain){
  var hand = S.players[OP].hand;
  var ci = hand.indexOf('cancel');
  if(ci < 0) return null;
  var last = chain[chain.length-1];
  if(last.caster !== 0) return null;
  var want = false, p = Math.random();
  if(last.spell==='curse') want = p < .8;
  else if(last.spell==='cyclone' && S.players[OP].guards <= 4) want = p < .85;
  else if(last.spell==='aging'){
    var t = findStriker(last.target);
    want = !!t && t.energy===1 && p < .6;
  }
  else if(last.spell==='cancel' && chain.length>=2 && chain[chain.length-2].caster===1) want = p < .55;
  else if(last.spell==='growth') want = p < .3;
  else if(last.spell==='heal') want = p < .2;
  return want ? { index:ci, target:null } : null;
}
function aiChooseCastOrDraw(){
  var a = S.players[OP];
  if(a.waiting.length && (a.field.length===0 || (a.field.length<2 && Math.random()<.45))){
    var pick = null;
    if(a.waiting.indexOf('monster')>=0 && a.guards>=7) pick='monster';
    else if(a.waiting.indexOf('hero')>=0) pick='hero';
    else if(a.waiting.indexOf('spirit')>=0) pick='spirit';
    else pick = a.waiting[0];
    return { act:'cast', type:pick };
  }
  return { act:'draw' };
}
function aiChooseMainSpell(){
  var a = S.players[OP], h = S.players[MY], hand = a.hand;
  var idx, tg;
  function strongest(list){ return list.slice().sort(function(x,y){ return y.energy-x.energy; })[0]; }
  // 呪詛: 相手の強いストライカーを除去
  idx = hand.indexOf('curse');
  if(idx>=0){
    var c = h.field.filter(function(s){ return s.type!=='spirit'; });
    if(c.length && strongest(c).energy>=2){
      var t = strongest(c);
      return { index:idx, target:{owner:0, uid:t.uid} };
    }
  }
  // 老化: エネルギー1をバウンス / 高エネルギーを弱体化
  idx = hand.indexOf('aging');
  if(idx>=0 && h.field.length){
    var one = h.field.filter(function(s){ return s.energy===1; })[0];
    if(one) return { index:idx, target:{owner:0, uid:one.uid} };
    var st = strongest(h.field);
    if(st.energy>=3) return { index:idx, target:{owner:0, uid:st.uid} };
  }
  // 竜巻: 護衛を削り切る
  idx = hand.indexOf('cyclone');
  if(idx>=0 && h.guards>0){
    var ready = a.field.some(function(s){ return s.enteredTurn < S.turnCount; });
    if(h.guards<=3 || (ready && h.guards<=5)) return { index:idx, target:null };
  }
  // 治癒
  idx = hand.indexOf('heal');
  if(idx>=0 && a.guards<=5) return { index:idx, target:null };
  // 成長
  idx = hand.indexOf('growth');
  if(idx>=0 && a.field.length && h.guards>0 && Math.random()<.6){
    var g = strongest(a.field);
    return { index:idx, target:{owner:1, uid:g.uid} };
  }
  return null;
}
async function aiTurn(){
  await sleep(800);
  // キャスト or ドロー
  while(S.castsLeft > 0 && !S.over){
    var d = aiChooseCastOrDraw();
    if(d.act==='cast') summon(OP, d.type); else draw(OP);
    S.castsLeft--;
    render();
    await sleep(750);
  }
  // スペル（最大2枚）
  for(var n=0; n<2 && !S.over; n++){
    var sp = aiChooseMainSpell();
    if(!sp) break;
    UI.busy = true;
    await castSpellFlow(OP, sp.index, sp.target);
    UI.busy = false;
    if(S.over) return;
    await sleep(650);
  }
  await sleep(500);
  if(S.over) return;
  await resolveAttack(OP);
  render();
  if(S.over) return;
  await sleep(900);
  startTurn(MY);
}

/* ============================== 攻撃・ターン ============================== */
async function resolveAttack(p){
  var me = S.players[p], op = S.players[1-p];
  var who = nameOf(p), cls = clsOf(p);
  var attackers = me.field.filter(function(s){ return s.enteredTurn < S.turnCount; });
  if(!attackers.length){ log(who + 'のアタックはなかった', cls); return; }
  var lethal = (op.guards === 0);
  var targetEl = lethal
    ? ((1-p)===MY ? $('myRuler') : $('oppRuler'))
    : guardSpotOf(1-p);
  log(who + 'のストライカーが実体化した！', cls);
  await attackCinematic(p, attackers, targetEl);
  if(lethal){
    sfx('finalblow');
    var rc = centerOf(targetEl);
    flash('#d84a4a', .5, 1000); shake(true);
    slashFx(rc.x, rc.y);
    burst(rc.x, rc.y, {n:40, colors:['#d84a4a','#ffd27a','#fff'], dist:170, size:10, dur:1100});
    ring(rc.x, rc.y, '#d84a4a', 220);
    popText(rc.x, rc.y-46, '討伐！', '#ffd27a');
    log(who + 'のストライカーが君主を討ち取った！', cls);
    gameOver(p);
    return;
  }
  var total = attackers.reduce(function(sum,s){ return sum+s.energy; }, 0);
  var names = attackers.map(function(s){ return STRIKERS[s.type].name + '(' + s.energy + ')'; }).join(' + ');
  var before = op.guards;
  op.guards = Math.max(0, op.guards - total);
  if(REDUCED) sfx('attack');
  var gc = centerOf(guardSpotOf(1-p));
  popText(gc.x, gc.y-34, '-'+(before-op.guards), '#ff8a8a');
  log(who + 'のアタック！ ' + names + ' → 護衛を' + (before-op.guards) + '体倒した（残り' + op.guards + '）', cls);
}
async function startTurn(p){
  if(S.over) return;
  S.turn = p; S.turnCount++;
  UI.sel = -1; UI.summon = false;
  closePicker();
  var who = nameOf(p);
  sfx('turn');
  log('── ' + who + 'のターン ──');
  // 怪物の生贄（1体ごとに捕食アニメーション）
  var monsters = S.players[p].field.filter(function(s){ return s.type==='monster'; });
  if(monsters.length){
    UI.busy = true;
    S.castsLeft = 0;
    render();
    for(var i=0;i<monsters.length;i++){
      if(S.players[p].guards>0){
        await sacrificeCinematic(p);
        S.players[p].guards--;
        if(REDUCED) sfx('sacrifice');
        var gp = centerOf(guardSpotOf(p));
        popText(gp.x, gp.y-30, '-1', '#ff8a8a');
        log('怪物が' + who + 'の護衛を1体生贄に捧げた（残り' + S.players[p].guards + '）', clsOf(p));
        render();
      } else {
        log('怪物は生贄を求めたが、護衛はもういない…', clsOf(p));
      }
    }
    UI.busy = false;
  }
  S.castsLeft = (S.turnsTaken[p]===0 && p===S.second) ? 2 : 1;
  S.turnsTaken[p]++;
  render();
  if(NET.mode==='ai' && p===OP) aiTurn();
}

function pcardEl(sym, labelText){
  var pc = document.createElement('div'); pc.className = 'pcard';
  pc.innerHTML = '<svg viewBox="0 0 300 420"><use href="#card-' + sym + '"/></svg>';
  if(labelText){
    var lab = document.createElement('div'); lab.className = 'plabel';
    lab.textContent = labelText;
    pc.appendChild(lab);
  }
  return pc;
}
function openStrikerPicker(){
  if(S.turn!==MY || S.castsLeft<=0 || UI.busy || S.over) return;
  UI.picker = 'summon'; UI.sel = -1;
  var pk = $('picker'); pk.innerHTML = ''; pk.classList.remove('hidden');
  var h = document.createElement('h3'); h.textContent = 'ストライカーを戦場に送る';
  var cards = document.createElement('div'); cards.className = 'cards';
  ['hero','spirit','monster'].forEach(function(type){
    if(S.players[MY].waiting.indexOf(type) < 0) return;
    var pc = pcardEl(type, '');
    pc.onclick = function(){ closePicker(); onSummonPick(type); };
    cards.appendChild(pc);
  });
  var btns = document.createElement('div'); btns.className = 'pbtns';
  var cancel = document.createElement('button'); cancel.className = 'btn warn'; cancel.textContent = 'やめる';
  cancel.onclick = closePicker;
  btns.appendChild(cancel);
  pk.appendChild(h); pk.appendChild(cards); pk.appendChild(btns);
}
function openHandPicker(){
  if(S.turn!==MY || UI.busy || S.over) return;
  if(!S.players[MY].hand.length){ log('手札がない'); return; }
  UI.picker = 'hand'; UI.pickSel = -1;
  renderHandPicker();
}
function renderHandPicker(){
  var pk = $('picker'); pk.innerHTML = ''; pk.classList.remove('hidden');
  var hand = S.players[MY].hand;
  var h = document.createElement('h3');
  h.textContent = S.castsLeft > 0 ? '手札 ── ドローかカードを選ぶ' : '手札 ── 唱えるカードを選ぶ';
  var cards = document.createElement('div'); cards.className = 'cards';
  hand.forEach(function(sp, i){
    var reactOnly = (sp === 'cancel');
    var noTgt = needsTarget(sp) && !legalTargets(MY, sp).length;
    var label = reactOnly ? '対応時に使用' : (noTgt ? '対象がいない' : '');
    var pc = pcardEl(sp, label);
    if(reactOnly || noTgt) pc.classList.add('inert');
    if(UI.pickSel === i) pc.classList.add('sel');
    if(!reactOnly && !noTgt) pc.onclick = function(){ UI.pickSel = i; renderHandPicker(); };
    cards.appendChild(pc);
  });
  var btns = document.createElement('div'); btns.className = 'pbtns';
  if(UI.pickSel >= 0){
    var sp = hand[UI.pickSel];
    var cast = document.createElement('button'); cast.className = 'btn';
    if(needsTarget(sp)){
      cast.textContent = '対象を選ぶ →';
      cast.onclick = function(){ var idx = UI.pickSel; closePicker(); UI.sel = idx; render(); };
    } else {
      cast.textContent = '「' + SPELLS[sp] + '」を唱える';
      cast.onclick = function(){ var idx = UI.pickSel; closePicker(); doCast(idx, null); };
    }
    btns.appendChild(cast);
  }
  if(S.castsLeft > 0){
    var dr = document.createElement('button'); dr.className = 'btn'; dr.textContent = 'カードを引く';
    dr.onclick = function(){ closePicker(); onDraw(); };
    btns.appendChild(dr);
  }
  var cancel = document.createElement('button'); cancel.className = 'btn warn'; cancel.textContent = '閉じる';
  cancel.onclick = closePicker;
  btns.appendChild(cancel);
  pk.appendChild(h); pk.appendChild(cards); pk.appendChild(btns);
}
function onHandTap(i){
  if(S.turn!==MY || UI.busy || S.over) return;
  if(UI.sel >= 0){ UI.sel = -1; render(); return; }   // 対象選択中なら解除
  openHandPicker();
}

/* ============================== 入力ハンドラ ============================== */
function onDraw(){
  if(S.turn!==MY || S.castsLeft<=0 || UI.busy || S.over) return;
  draw(MY); S.castsLeft--; netSend({t:'draw'}); render();
}
function onSummonPick(type){
  if(S.turn!==MY || S.castsLeft<=0 || UI.busy || S.over) return;
  summon(MY, type); S.castsLeft--; netSend({t:'summon', type:type}); UI.summon=false; render();
}
function onHandClick(i){
  if(S.turn!==MY || UI.busy || S.over || UI.summon) return;
  var sp = S.players[MY].hand[i];
  if(sp==='cancel'){ log('「取消」は相手の呪文への対応時に使える'); return; }
  if(UI.sel===i){
    if(needsTarget(sp)){ UI.sel=-1; render(); return; } // 選択解除
    doCast(i, null);
    return;
  }
  UI.sel = i;
  if(needsTarget(sp) && !legalTargets(MY, sp).length){
    log('「' + SPELLS[sp] + '」の対象がいない');
    UI.sel = -1;
  }
  render();
}
function onTargetPick(t){
  if(UI.sel<0) return;
  doCast(UI.sel, t);
}
async function doCast(i, target){
  UI.busy = true; UI.sel = -1;
  netSend({t:'cast', i:i, target:target||null});
  render();
  await castSpellFlow(MY, i, target);
  UI.busy = false;
  render();
}
async function onEndTurn(){
  if(S.turn!==MY || S.castsLeft>0 || UI.busy || S.over) return;
  UI.busy = true; UI.sel=-1; UI.summon=false;
  netSend({t:'end'});
  await resolveAttack(MY);
  render();
  if(S.over){ UI.busy = false; return; }
  await sleep(800);
  UI.busy = false;   // ターンが切り替わるまで入力をロック（二重ターン終了防止）
  startTurn(OP);
}

/* ============================== 開始演出 ============================== */
function openingRoll(){
  var panel = $('overlayPanel');
  panel.innerHTML = '';
  var h = document.createElement('h2'); h.textContent = 'WARGRACE';
  var p = document.createElement('p');
  p.textContent = 'ダイスで先攻を決める ── 大きい目が先攻。後攻は最初のターンのみ、キャスト or ドローを2回行える。';
  var row = document.createElement('div');
  var d1 = document.createElement('span'); d1.className='droll'; d1.textContent='?';
  var d2 = document.createElement('span'); d2.className='droll'; d2.textContent='?';
  var lab = document.createElement('p'); lab.textContent='あなた ／ 相手';
  row.appendChild(d1); row.appendChild(d2);
  var btns = document.createElement('div'); btns.className='btns';
  var b = document.createElement('button'); b.className='btn'; b.textContent='ダイスを振る';
  btns.appendChild(b);
  panel.appendChild(h); panel.appendChild(p); panel.appendChild(row); panel.appendChild(lab); panel.appendChild(btns);
  $('overlay').classList.remove('hidden');
  var myRoll = S.rolls[MY], opRoll = S.rolls[OP];
  b.onclick = function(){
    b.disabled = true;
    var n = 0;
    var iv = setInterval(function(){
      d1.textContent = 1+Math.floor(Math.random()*6);
      d2.textContent = 1+Math.floor(Math.random()*6);
      sfx('dice');
      if(++n >= 12){
        clearInterval(iv);
        d1.textContent = myRoll; d2.textContent = opRoll;
        p.textContent = nameOf(S.first) + 'が先攻！ ' + nameOf(S.second) + 'は最初のターンのみ2回行動できる。';
        b.textContent = '開戦';
        b.disabled = false;
        b.onclick = function(){
          $('overlay').classList.add('hidden');
          if(NET.mode==='ai') startTurn(S.first);   // オンラインでは既にゲーム進行中
        };
      }
    }, 70);
  };
}
function startMatch(mode, seed){
  NET.mode = mode;
  MY = (mode==='guest') ? 1 : 0;
  OP = 1 - MY;
  rng = mulberry32(seed >>> 0);
  uidSeq = 0;
  S = newState();
  UI = { sel:-1, summon:false, busy:false };
  pendingWait = {}; inbox = [];
  $('log').innerHTML = '';
  // 山札・初期手札・先攻ダイスはシード共有で両クライアント同一
  for(var i=0;i<3;i++){ S.players[0].hand.push(S.deck.pop()); S.players[1].hand.push(S.deck.pop()); }
  var r0, r1; do{ r0 = 1+Math.floor(rng()*6); r1 = 1+Math.floor(rng()*6); }while(r0===r1);
  S.first = r0>r1 ? 0 : 1; S.second = 1-S.first;
  S.rolls = [r0, r1];
  log('両者はカードを3枚引いた');
  log('先攻: ' + nameOf(S.first) + '（ダイス ' + Math.max(r0,r1) + ' vs ' + Math.min(r0,r1) + '）');
  render();
  openingRoll();
  if(NET.mode!=='ai') startTurn(S.first);   // 両クライアントで即開始（演出は各自で閉じる）
}

/* ============================== 通信（WebRTC・サーバー不要） ============================== */
function netSend(o){
  if(NET.mode!=='ai' && NET.dc && NET.dc.readyState==='open') NET.dc.send(JSON.stringify(o));
}
function waitMsg(type){
  for(var i=0;i<inbox.length;i++) if(inbox[i].t===type) return Promise.resolve(inbox.splice(i,1)[0]);
  return new Promise(function(res){ pendingWait[type] = res; });
}
function routeMsg(m){
  if(pendingWait[m.t]){ var r = pendingWait[m.t]; delete pendingWait[m.t]; r(m); return; }
  switch(m.t){
    case 'init': startMatch('guest', m.seed); break;
    case 'draw': draw(OP); S.castsLeft--; render(); break;
    case 'summon': summon(OP, m.type); S.castsLeft--; render(); break;
    case 'cast':
      (async function(){
        UI.busy = true; render();
        await castSpellFlow(OP, m.i, m.target||null);
        UI.busy = false; render();
      })();
      break;
    case 'end':
      (async function(){
        UI.busy = true;
        await resolveAttack(OP);
        UI.busy = false;
        render();
        if(S.over) return;
        await sleep(800);
        startTurn(MY);
      })();
      break;
    case 'rematch': startMatch('guest', m.seed); break;
    case 'rematch-req':
      var sd = (Math.random()*4294967296)>>>0;
      netSend({t:'rematch', seed:sd});
      startMatch('host', sd);
      break;
    default: inbox.push(m);
  }
}
function netClose(){
  try{
    if(NET.dc){ NET.dc.onclose = null; NET.dc.close(); }
    if(NET.pc) NET.pc.close();
  }catch(e){}
  NET = { mode:'ai', pc:null, dc:null };
}
function onDisconnect(){
  if(NET.mode==='ai') return;
  log('通信が切断された');
  if(S && !S.over){
    S.over = true; render();
    var panel = panelReset();
    var h = document.createElement('h2'); h.textContent = '接続が切れました'; h.style.fontSize='22px';
    var p = document.createElement('p'); p.textContent = '相手との通信が切断されました。';
    var btns = document.createElement('div'); btns.className='btns';
    var b = document.createElement('button'); b.className='btn'; b.textContent='メニューへ';
    b.onclick = function(){ netClose(); showMenu(); };
    btns.appendChild(b);
    panel.appendChild(h); panel.appendChild(p); panel.appendChild(btns);
  }
}
function b64e(o){ return btoa(unescape(encodeURIComponent(JSON.stringify(o)))); }
function b64d(s){ return JSON.parse(decodeURIComponent(escape(atob(s.replace(/\s+/g,''))))); }
function makePC(){ return new RTCPeerConnection({ iceServers:[{ urls:'stun:stun.l.google.com:19302' }] }); }
function gatherDone(pc){
  return new Promise(function(res){
    if(pc.iceGatheringState==='complete') return res();
    var to = setTimeout(res, 4000);
    pc.addEventListener('icegatheringstatechange', function(){
      if(pc.iceGatheringState==='complete'){ clearTimeout(to); res(); }
    });
  });
}
function wireChannel(dc, onOpen){
  NET.dc = dc;
  dc.onmessage = function(e){ try{ routeMsg(JSON.parse(e.data)); }catch(err){} };
  dc.onopen = onOpen;
  dc.onclose = onDisconnect;
}

/* ============================== メニュー／ロビー ============================== */
function panelReset(){
  var panel = $('overlayPanel'); panel.innerHTML = '';
  $('overlay').classList.remove('hidden');
  return panel;
}
function mkEl(tag, cls, text){
  var d = document.createElement(tag);
  if(cls) d.className = cls;
  if(text != null) d.textContent = text;
  return d;
}
function copyBtn(src){
  var b = mkEl('button','btn','コピー');
  b.onclick = function(){
    src.select();
    var ok = true;
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(src.value);
    else ok = document.execCommand('copy');
    b.textContent = ok ? 'コピーしました' : 'コピー失敗';
    setTimeout(function(){ b.textContent = 'コピー'; }, 1600);
  };
  return b;
}
function showMenu(){
  netClose();
  var panel = panelReset();
  panel.appendChild(mkEl('h2', null, 'WARGRACE'));
  panel.appendChild(mkEl('p', null, '対戦モードを選択 ── オンライン対戦はサーバー不要。招待コードを交換して直接つながります。'));
  var btns = mkEl('div','btns');
  var a = mkEl('button','btn','AIと対戦');
  a.onclick = function(){ startMatch('ai', (Math.random()*4294967296)>>>0); };
  var hb = mkEl('button','btn','部屋を作る（ホスト）');
  hb.onclick = showHost;
  var g = mkEl('button','btn','部屋に参加（ゲスト）');
  g.onclick = showJoin;
  btns.appendChild(a); btns.appendChild(hb); btns.appendChild(g);
  panel.appendChild(btns);
  var ver = mkEl('p', null, 'ピンチで拡大 / ダブルタップで戻す　　ver ' + WG_VERSION);
  ver.style.cssText = 'margin-top:16px; font-size:11px; opacity:.6;';
  panel.appendChild(ver);
}
function showHost(){
  var panel = panelReset();
  panel.appendChild(mkEl('h2', null, '部屋を作る'));
  var st = mkEl('p', null, '招待コードを生成中…');
  panel.appendChild(st);
  var inv = mkEl('textarea','codebox'); inv.readOnly = true; inv.setAttribute('aria-label','招待コード');
  panel.appendChild(inv);
  var r1 = mkEl('div','btns'); r1.appendChild(copyBtn(inv)); panel.appendChild(r1);
  panel.appendChild(mkEl('p', null, '相手から届いた応答コードを貼り付け:'));
  var ans = mkEl('textarea','codebox'); ans.setAttribute('aria-label','応答コード');
  panel.appendChild(ans);
  var r2 = mkEl('div','btns');
  var con = mkEl('button','btn','接続する');
  con.onclick = async function(){
    try{
      con.disabled = true; st.textContent = '接続中…';
      await NET.pc.setRemoteDescription(b64d(ans.value));
    }catch(e){ st.textContent = '応答コードが不正です'; con.disabled = false; }
  };
  var back = mkEl('button','btn warn','戻る');
  back.onclick = showMenu;
  r2.appendChild(con); r2.appendChild(back); panel.appendChild(r2);
  (async function(){
    try{
      netClose(); NET.mode = 'host';
      NET.pc = makePC();
      wireChannel(NET.pc.createDataChannel('wg'), function(){
        var sd = (Math.random()*4294967296)>>>0;
        netSend({t:'init', seed:sd});
        startMatch('host', sd);
      });
      var offer = await NET.pc.createOffer();
      await NET.pc.setLocalDescription(offer);
      await gatherDone(NET.pc);
      inv.value = b64e(NET.pc.localDescription);
      st.textContent = '① 招待コードを相手に送る ② 相手の応答コードを貼って接続';
    }catch(e){ st.textContent = 'コード生成に失敗しました: ' + e.message; }
  })();
}
function showJoin(){
  var panel = panelReset();
  panel.appendChild(mkEl('h2', null, '部屋に参加'));
  var st = mkEl('p', null, 'ホストから届いた招待コードを貼り付けてください。');
  panel.appendChild(st);
  var inv = mkEl('textarea','codebox'); inv.setAttribute('aria-label','招待コード');
  panel.appendChild(inv);
  var r1 = mkEl('div','btns');
  var gen = mkEl('button','btn','応答コードを作る');
  var back = mkEl('button','btn warn','戻る');
  back.onclick = showMenu;
  r1.appendChild(gen); r1.appendChild(back);
  panel.appendChild(r1);
  var ans = mkEl('textarea','codebox'); ans.readOnly = true; ans.style.display = 'none'; ans.setAttribute('aria-label','応答コード');
  panel.appendChild(ans);
  var r2 = mkEl('div','btns'); r2.style.display = 'none';
  r2.appendChild(copyBtn(ans)); panel.appendChild(r2);
  gen.onclick = async function(){
    try{
      gen.disabled = true; st.textContent = '応答コードを生成中…';
      netClose(); NET.mode = 'guest';
      NET.pc = makePC();
      NET.pc.ondatachannel = function(e){
        wireChannel(e.channel, function(){ st.textContent = '接続完了！ ゲームを開始します…'; });
      };
      await NET.pc.setRemoteDescription(b64d(inv.value));
      var answer = await NET.pc.createAnswer();
      await NET.pc.setLocalDescription(answer);
      await gatherDone(NET.pc);
      ans.value = b64e(NET.pc.localDescription);
      ans.style.display = ''; r2.style.display = '';
      st.textContent = '応答コードをホストに送り、接続を待ってください…';
    }catch(e){ st.textContent = '招待コードが不正です'; gen.disabled = false; }
  };
}

/* ============================== 画面調整 ============================== */
var root = document.documentElement;
function fit(){
  var narrow = window.innerWidth <= 900 || window.innerHeight <= 560;
  var s;
  if(narrow){
    // 手札の扇は隠れているので縦の余白を切り詰め、傾き投影ぶん大きく表示（カードを拡大）
    var sW = window.innerWidth / 900;
    var sH = (window.innerHeight - 20) / 660;
    s = Math.min(sW, sH, 1.5);
  } else {
    s = Math.min(window.innerWidth/1180, (window.innerHeight-150)/1000, 1.05);
  }
  root.style.setProperty('--fit', s);
}
window.addEventListener('resize', fit); fit();
$('tilt').addEventListener('input', function(e){
  root.style.setProperty('--tilt', e.target.value + 'deg');
});

/* ピンチズーム & パン ── 盤面を指で自由に拡大・移動（ダブルタップ/ホイールにも対応） */
(function(){
  var scene = document.querySelector('.scene');
  var uz=1, px=0, py=0;
  var pts = new Map();
  var pinch=null, pan1=null, lastTap=0;
  function clamp(v,a,b){ return Math.min(b, Math.max(a, v)); }
  function apply(){
    uz = clamp(uz, 0.7, 3.5);
    var limX = window.innerWidth * 0.55 * uz, limY = window.innerHeight * 0.65 * uz;
    px = clamp(px, -limX, limX); py = clamp(py, -limY, limY);
    root.style.setProperty('--userZoom', uz);
    root.style.setProperty('--panX', px+'px');
    root.style.setProperty('--panY', py+'px');
  }
  function arr(){ var a=[]; pts.forEach(function(v){ a.push(v); }); return a; }
  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
  function mid(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }
  scene.addEventListener('pointerdown', function(e){
    try{ scene.setPointerCapture(e.pointerId); }catch(err){}
    pts.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(pts.size===2){
      var p=arr(); pinch={dist:dist(p[0],p[1]), zoom:uz, mid:mid(p[0],p[1]), pan:{x:px,y:py}}; pan1=null;
    } else if(pts.size===1){
      pan1={x:e.clientX, y:e.clientY};
      var now=Date.now();
      if(now-lastTap < 300){ uz=1; px=0; py=0; apply(); }   // ダブルタップで元に戻す
      lastTap=now;
    }
  });
  scene.addEventListener('pointermove', function(e){
    if(!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, {x:e.clientX, y:e.clientY});
    var p=arr(), cx=window.innerWidth/2, cy=window.innerHeight/2;
    if(pts.size>=2 && pinch){
      var cur=mid(p[0],p[1]);
      uz = clamp(pinch.zoom * (dist(p[0],p[1]) / pinch.dist), 0.7, 3.5);
      px = cur.x - cx - (pinch.mid.x - cx - pinch.pan.x) * (uz/pinch.zoom);
      py = cur.y - cy - (pinch.mid.y - cy - pinch.pan.y) * (uz/pinch.zoom);
      apply(); e.preventDefault();
    } else if(pts.size===1 && pan1 && uz>1.02){
      px += e.clientX - pan1.x; py += e.clientY - pan1.y;
      pan1={x:e.clientX, y:e.clientY};
      apply(); e.preventDefault();
    }
  });
  function up(e){
    pts.delete(e.pointerId);
    if(pts.size<2) pinch=null;
    if(pts.size===0) pan1=null;
    else { var p=arr()[0]; pan1={x:p.x, y:p.y}; }
  }
  scene.addEventListener('pointerup', up);
  scene.addEventListener('pointercancel', up);
  scene.addEventListener('wheel', function(e){
    e.preventDefault();
    var cx=window.innerWidth/2, cy=window.innerHeight/2, old=uz;
    uz = clamp(uz * (e.deltaY<0 ? 1.12 : 0.89), 0.7, 3.5);
    px = e.clientX - cx - (e.clientX - cx - px) * (uz/old);
    py = e.clientY - cy - (e.clientY - cy - py) * (uz/old);
    apply();
  }, {passive:false});
})();

/* オーディオ設定 */
function syncAudioBtns(){
  $('bgmBtn').classList.toggle('off', !audioPref.bgm);
  $('sfxBtn').classList.toggle('off', !audioPref.sfx);
  $('bgmBtn').setAttribute('aria-pressed', String(audioPref.bgm));
  $('sfxBtn').setAttribute('aria-pressed', String(audioPref.sfx));
}
$('bgmBtn').addEventListener('click', function(){
  audioPref.bgm = !audioPref.bgm; savePref(); ensureAudio();
  if(musBus) musBus.gain.linearRampToValueAtTime(audioPref.bgm ? MUS_VOL : 0, AC.currentTime + .3);
  syncAudioBtns();
});
$('sfxBtn').addEventListener('click', function(){
  audioPref.sfx = !audioPref.sfx; savePref(); ensureAudio();
  if(sfxBus) sfxBus.gain.value = audioPref.sfx ? .5 : 0;
  syncAudioBtns();
  if(audioPref.sfx) sfx('click');
});
syncAudioBtns();
document.addEventListener('pointerdown', function(){ ensureAudio(); }, {passive:true});
document.addEventListener('click', function(e){
  var el = e.target;
  while(el && el !== document.body){
    if(el.classList && el.classList.contains('btn')){ sfx('click'); break; }
    el = el.parentNode;
  }
}, true);

showMenu();
})();
